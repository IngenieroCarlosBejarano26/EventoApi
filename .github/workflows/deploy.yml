# CI: build, test and deploy to Azure App Service on push to main
name: Deploy API (Azure App Service)

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: eventosvivos-api-t37ke2
  DOTNET_VERSION: "10.0.x"
  PROJECT_PATH: src/EventosVivos.Api/EventosVivos.Api.csproj
  SOLUTION_PATH: EventosVivos.slnx

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Test
        run: dotnet test ${{ env.SOLUTION_PATH }} --no-restore --configuration Release

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --no-restore --configuration Release --output publish

      - name: Clean publish output
        run: rm -rf publish/BuildHost-*

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: publish
